  <script>

$(document).ready(function(){

const d = new Date();
  currentDate = d.toString() ;

  min = d.getMinutes() ;
  month = d.getMonth() + 1;  // starts from 0 so add 1 
  year = d.getFullYear() ;

$('#downloadLink').show().prop('disabled',true).hide();

 $grade = 'G';

 
// load grades into dropdown
// grades are for the current school year

$.ajax({
  url: 'loadSchoolGrade.php'

})  // parameters
.done(function (response) { 

 gradeData = JSON.parse(response);

console.log(gradeData);
var l =gradeData.length;

for (var i = 0 ; i < l ; i++)
{
    $('#selectGrade').append($('<option></option>').text(gradeData[i]));
}

})  // fail


// load grades into dropdown

<script type="text/javascript">

$(document).ready(function(){
     
  $('#view').on("click", function() {

    $('#myData').empty() ;


var grd = $('#selectGrade :selected').text() ;
var yearMonth = $('#selectYearMonth :selected').text() ;
var myArray = grd.split("-");
var grade = myArray[0] ;
console.log("YM",yearMonth) ;

if (grade > 'G' & yearMonth >= '2021-12')
{

console.log(grd,"Split grade",grade);
// grade = 'G10A';
//alert('Grade = ' + grade + ' ' + yearMonth);
    $.ajax({
  url: 'pioMonthlyAttendanceQueryv2.php',
  type: 'POST',
  data: {grade:grade,yearMonth:yearMonth},  // always for the current month
 // datatype: 'json'
})  // parameters
.done(function (response) { 

//// alert('data ' + data.length);
console.log(response);

$('#myData').html(response);


})  //done
.fail(function (jqXHR, textStatus, errorThrown) {

})  // fail

}
else { alert('No data'); }


  })
})

</script>
