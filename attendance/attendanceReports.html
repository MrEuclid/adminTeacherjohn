<script type="text/javascript">

$(document).ready(function(){

 // if (day < 10) {day = '0' + day;}
  today = year + '-' + month + '-' + day;
  alert('Report for ' + today) ;

console.log(today) ;
     $.ajax({
  url: 'dailyAttendanceQuery.php',
  type: 'POST',
  data: {today:today}, 
  datatype: 'json'
})  // parameters
.done(function (response) { 
data = JSON.parse(response) ;

var dataKeys = [] ;
 console.log("Data",data) ;
 $('#todayTable').show() ;

var header = '<tr><th>Grade</th><th>Absent</th><th>Present</th><th>Total</th><th>Percent</th><th>Time</th><th>Date</th></tr>' ;


$('#todayTable').last().append(header);

for(var i = 0 ; i < data.length ; i++)
    {
  // put data into table   

var grade = data[i]["Grade"];
var total = data[i]["Total"]
var absent = data[i]["Absent"];
var present = data[i]["Present"] ;
var percent = data[i]["Percent"] ;

var shortTime = data[i]["shortTime"];
var shortDate = data[i]["shortDate"];

var row = '<tr><td>' + 
      grade + '</td><td>' + 
      absent + '</td><td>' + 
      present + '</td><td>' + 
      total + '</td><td>' + 
      percent + '</td><td>' +
      shortTime + '</td><td>' +
      shortDate + '</td></tr>'  ;

$('#todayTable').last().append(row);

// console.log(row);

}


                    

})  //done
